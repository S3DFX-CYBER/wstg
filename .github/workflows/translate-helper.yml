name: Translate Helper

on:
  pull_request_target:
    types: [labeled, synchronize]
    paths:
      - "**/*.md"
  workflow_dispatch: 

jobs:
  translate-helper:
    # Simplified 'if' to handle the null/false inconsistency
    if: |
      contains(github.event.pull_request.labels.*.name, 'ready-to-translate') &&
      github.event.pull_request.draft != true
    
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Detect changes
        id: files
        run: |
          # Use head.sha and base.ref from the event to ensure we get the right diff
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }}" -- '*.md' > changed_files.txt
          
          if [ ! -s changed_files.txt ]; then
            echo "No markdown changes detected."
            # Don't fail the job, just stop here
            exit 0
          fi

      - name: Run Sarvam Helper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          SARVAM_API_URL: ${{ vars.SARVAM_API_URL || 'https://api.sarvam.ai/translate' }}
          SARVAM_MODEL: ${{ vars.SARVAM_MODEL || 'mayura-v1' }}
          SARVAM_SOURCE_LANG: ${{ vars.SARVAM_SOURCE_LANG || 'en-IN' }}
          SARVAM_TARGET_LANG: ${{ vars.SARVAM_TARGET_LANG || 'hi-IN' }}
        run: |
          python3 scripts/sarvam_helper.py \
            --changed-files changed_files.txt \
            --glossary GLOSSARY.json
