name: Translate Helper

on:
  pull_request_target:
    types: [labeled, synchronize]
    paths:
      - "**/*.md"
  workflow_dispatch: 

jobs:
  translate-helper:
    if: |
      contains(github.event.pull_request.labels.*.name, 'ready-to-translate') &&
      github.event.pull_request.draft != true
    
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          # We fetch the base branch so we have it locally for comparison
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Detect changes
        id: files
        run: |
          # 1. Explicitly fetch the HEAD commit from the contributor's fork
          # Without this, git diff will fail because it doesn't know the SHA
          git fetch origin ${{ github.event.pull_request.head.sha }} --depth=1
          
          # 2. Compare the BASE SHA (your master) with the HEAD SHA (their PR)
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- '*.md' > changed_files.txt
          
          if [ ! -s changed_files.txt ]; then
            echo "No markdown changes detected."
            exit 0
          fi
          echo "Changes detected in:"
          cat changed_files.txt

      - name: Run Sarvam Helper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          SARVAM_API_URL: ${{ vars.SARVAM_API_URL || 'https://api.sarvam.ai/translate' }}
          SARVAM_MODEL: ${{ vars.SARVAM_MODEL || 'mayura-v1' }}
          SARVAM_SOURCE_LANG: ${{ vars.SARVAM_SOURCE_LANG || 'en-IN' }}
          SARVAM_TARGET_LANG: ${{ vars.SARVAM_TARGET_LANG || 'hi-IN' }}
        run: |
          python3 scripts/sarvam_helper.py \
            --changed-files changed_files.txt \
            --glossary GLOSSARY.json
